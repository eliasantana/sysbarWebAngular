<div class="container">  
  <form>
    <mat-form-field class="example-full-width" class="medio">
      <mat-label>Pesquisar</mat-label>
      <input matInput placholder="Pesquisar" (keyup)="filtro($event)">
      <mat-icon matSuffix aria-hidden="false" aria-label="Example home icon" fontIcon="search"></mat-icon>
    </mat-form-field>  
  </form>
  <h1>Empresas Cadastradas</h1>  
  <table mat-table [dataSource]="vetor" class="mat-elevation-z8">
    
      <ng-container matColumnDef="cdEmpresa">
        <th mat-header-cell *matHeaderCellDef> ID. </th>
        <td mat-cell *matCellDef="let empresa"> {{empresa.cdEmpresa}} </td>
      </ng-container>
        
      <ng-container matColumnDef="nomeEmpresa">
        <th mat-header-cell *matHeaderCellDef> Nome </th>
        <td mat-cell *matCellDef="let empresa"> {{empresa.nomeEmpresa}} </td>
      </ng-container>
    
      <ng-container matColumnDef="telefone">
        <th mat-header-cell *matHeaderCellDef> Telefone </th>
        <td mat-cell *matCellDef="let empresa"> {{empresa.telefone}} </td>
      </ng-container>
    
      <ng-container matColumnDef="celular">
        <th mat-header-cell *matHeaderCellDef> Celular </th>
        <td mat-cell *matCellDef="let empresa"> {{empresa.celular}} </td>
      </ng-container>
    
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> E-mail </th>
        <td mat-cell *matCellDef="let empresa"> {{empresa.email}} </td>
      </ng-container>
      
      <ng-container matColumnDef="tetoDesconto">
        <th mat-header-cell *matHeaderCellDef> Teto Desconto </th>
        <td mat-cell *matCellDef="let empresa"> {{empresa.tetoDesconto}} </td>
      </ng-container>    
      
      <ng-container matColumnDef="acao">
        <th mat-header-cell *matHeaderCellDef> Ação </th>
        <td mat-cell *matCellDef="let empresa"> 
          <button matMiniFab class="btn-excluir" (click)="confirma(empresa)">
            <mat-icon>delete</mat-icon>
          </button>
          <button matMiniFab class="btn-editar">
            <mat-icon>edit_note</mat-icon>
          </button>          
        </td>
      </ng-container>   

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
    </table>  
  </div>
