<div class="formulario">
    <h1 class="titulo">Cadastro de Funcionários</h1>
        <form [formGroup]="formularioFuncionario">
            <mat-form-field class="id">
                <mat-label>Código</mat-label>
                <input  matInput type="text" formControlName="cdFuncionario"/>        
            </mat-form-field>     
            <mat-form-field class="grande">
                <mat-label>Nome</mat-label>
                <input  matInput type="text" formControlName="nome"/>        
            </mat-form-field>     
            <mat-form-field class="medio">
                <mat-label>Caminho imagem</mat-label>
                <input  matInput type="text" formControlName="caminhoImagem"/>        
            </mat-form-field>     
            <mat-form-field class="pequeno">
                <mat-label>Telefone</mat-label>
                <input  matInput type="text" formControlName="telefone" mask="(99)99999-9999"/>        
            </mat-form-field>     
            <mat-form-field class="pequeno">
                <mat-label>Login</mat-label>
                <input  matInput type="text" formControlName="login"/>        
            </mat-form-field> 
            <mat-form-field class="pequeno">
                <mat-label>Senha</mat-label>
                <input  matInput type="password" formControlName="senha"/>        
            </mat-form-field>       
        </form>
</div>
