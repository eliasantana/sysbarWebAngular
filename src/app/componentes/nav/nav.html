<app-topo></app-topo>
<mat-drawer-container class="container" autosize>    
    <mat-drawer #drawer class="sidenav" mode="side">
      <mat-nav-list>    
        <a mat-list-item routerLink="/">
            <mat-icon matListItemIcon>home</mat-icon>
            <span matListItemTitle>Home</span>
        </a>
        <a mat-list-item routerLink="/cargos">
            <mat-icon matListItemIcon>badge</mat-icon>
            <span matListItemTitle>Cargos</span>               
        </a>          
        <a mat-list-item routerLink="/empresa">
            <mat-icon matListItemIcon>apartment</mat-icon>
            <span matListItemTitle>Empresas</span>               
        </a>          
      </mat-nav-list>         
    </mat-drawer>    
    <div class="sidenav-content">
        <div class="button-row">
            <div class="flex-container">                
                <button type="button"  matButton="elevated"  (click)="drawer.toggle()">      
                    <mat-icon>menu</mat-icon> Menu        
                </button>
                <div class="logo"> <img src="logo.png"> </div>
                <router-outlet></router-outlet>
            </div>
        </div>
    </div>  
  </mat-drawer-container>
